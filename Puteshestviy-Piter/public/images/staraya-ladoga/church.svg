<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e2518"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect y="330" width="800" height="120" fill="rgba(0,0,0,0.35)"/>
  <!-- Church body -->
  <rect x="330" y="200" width="140" height="150" fill="rgba(255,255,255,0.06)" rx="2"/>
  <!-- Apsis (rounded end) -->
  <ellipse cx="470" cy="270" rx="35" ry="60" fill="rgba(255,255,255,0.04)"/>
  <!-- Drum + dome -->
  <rect x="365" y="155" width="70" height="55" fill="rgba(255,255,255,0.06)" rx="1"/>
  <ellipse cx="400" cy="150" rx="38" ry="32" fill="rgba(255,255,255,0.07)"/>
  <!-- Cross -->
  <rect x="397" y="110" width="6" height="35" fill="rgba(255,255,255,0.25)"/>
  <rect x="388" y="120" width="24" height="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Window arches -->
  <ellipse cx="370" cy="240" rx="15" ry="22" fill="rgba(0,0,0,0.4)"/>
  <ellipse cx="430" cy="240" rx="15" ry="22" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="375" width="800" height="75" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="412" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif" font-weight="600">Храм святого Георгия XII в.</text>
  <text x="400" y="436" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif">TODO: добавить фото храма · church.jpg</text>
</svg>
