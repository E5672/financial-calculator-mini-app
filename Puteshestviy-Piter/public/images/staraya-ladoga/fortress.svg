  <rect x="360" y="270" width="80" height="70" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="375" width="800" height="75" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="412" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="18" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif" font-weight="600">Ладожская крепость</text>
