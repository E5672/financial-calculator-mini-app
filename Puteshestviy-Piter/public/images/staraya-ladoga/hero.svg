<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a2f"/>
      <stop offset="100%" stop-color="#0f2235"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a6b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a2535" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Sky gradient overlay -->
  <rect width="800" height="280" fill="rgba(20,50,35,0.4)"/>
  <!-- Water strip -->
  <rect y="310" width="800" height="140" fill="url(#water)"/>
  <!-- Castle silhouette -->
  <rect x="260" y="200" width="280" height="130" fill="rgba(255,255,255,0.05)" rx="2"/>
  <rect x="255" y="175" width="40" height="65" fill="rgba(255,255,255,0.05)" rx="2"/>
  <rect x="505" y="175" width="40" height="65" fill="rgba(255,255,255,0.05)" rx="2"/>
  <rect x="340" y="158" width="130" height="48" fill="rgba(255,255,255,0.05)" rx="2"/>
  <rect x="375" y="140" width="20" height="28" fill="rgba(255,255,255,0.07)"/>
  <rect x="405" y="140" width="20" height="28" fill="rgba(255,255,255,0.07)"/>
  <!-- Reflection in water -->
  <rect x="290" y="340" width="220" height="80" fill="rgba(255,255,255,0.03)" rx="2"/>
  <!-- Text block -->
  <rect x="0" y="360" width="800" height="90" fill="rgba(0,0,0,0.45)"/>
  <text x="400" y="400" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-size="22" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif" font-weight="600">Старая Ладога</text>
  <text x="400" y="428" text-anchor="middle" fill="rgba(255,255,255,0.38)" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Helvetica,sans-serif">TODO: добавить главное фото маршрута · public/images/staraya-ladoga/hero.jpg</text>
</svg>
